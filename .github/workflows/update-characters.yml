name: Update Characters from Wiki

on:
  schedule:
    # 每周五 20:00 UTC+8 = 12:00 UTC
    - cron: "0 12 * * 5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (只输出日志，不提交)"
        type: boolean
        default: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install script dependencies
        run: npm install
        working-directory: scripts

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/scrape-characters.mjs

      - name: Show log
        run: cat scripts/character-diff.log || true
